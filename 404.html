<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Cascade Technologies Solutions</title>
    <!--
      SPA redirect for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      When GH Pages can't find a file it serves this 404.html.
      We encode the intended path as a query-string so `index.html` can restore it.
      pathSegmentsToKeep = 1  →  keeps /Cascade_Space/ as the base segment.
    -->
    <script>
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.host + '/' +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>Redirecting&hellip;</body>

</html>
